name: Build and Push to ECR

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1              # 👉 change if needed
  ECR_REPOSITORY: java-ecr             # 👉 your repo name
  IMAGE_TAG: latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Debug - Print Environment
      run: |
        echo "=== DEBUG: ENV VARIABLES ==="
        echo "AWS_REGION=$AWS_REGION"
        echo "ECR_REPOSITORY=$ECR_REPOSITORY"
        echo "IMAGE_TAG=$IMAGE_TAG"

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Debug - Check AWS Identity
      run: |
        echo "=== DEBUG: AWS Identity ==="
        aws sts get-caller-identity

    - name: Debug - Get Account ID
      id: account
      run: |
        echo "=== DEBUG: Fetch Account ID ==="
        ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
        echo "ACCOUNT_ID=$ACCOUNT_ID"
        echo "ACCOUNT_ID=$ACCOUNT_ID" >> $GITHUB_ENV

    - name: Debug - Construct ECR Registry
      run: |
        echo "=== DEBUG: Constructing ECR Registry ==="
        echo "ACCOUNT_ID=$ACCOUNT_ID"
        echo "AWS_REGION=$AWS_REGION"
        ECR_REGISTRY="$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"
        echo "ECR_REGISTRY=$ECR_REGISTRY"
        echo "ECR_REGISTRY=$ECR_REGISTRY" >> $GITHUB_ENV

    - name: Debug - List Existing Repositories
      run: |
        echo "=== DEBUG: Listing ECR Repos ==="
        aws ecr describe-repositories || echo "No repos found"

    - name: Create ECR Repo if Not Exists
      run: |
        echo "=== DEBUG: Checking/Creating Repo ==="
        aws ecr describe-repositories --repository-names $ECR_REPOSITORY || \
        aws ecr create-repository --repository-name $ECR_REPOSITORY

    - name: Login to ECR
      run: |
        echo "=== DEBUG: Logging into ECR ==="
        aws ecr get-login-password --region $AWS_REGION | \
        docker login --username AWS --password-stdin $ECR_REGISTRY

    - name: Build Docker Image
      run: |
        echo "=== DEBUG: Building Docker Image ==="
        docker build -t $ECR_REPOSITORY:$IMAGE_TAG .

    - name: Tag Docker Image
      run: |
        echo "=== DEBUG: Tagging Image ==="
        FULL_IMAGE_NAME="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
        echo "FULL_IMAGE_NAME=$FULL_IMAGE_NAME"
        docker tag $ECR_REPOSITORY:$IMAGE_TAG $FULL_IMAGE_NAME
        echo "FULL_IMAGE_NAME=$FULL_IMAGE_NAME" >> $GITHUB_ENV

    - name: Push Docker Image
      run: |
        echo "=== DEBUG: Pushing Image ==="
        docker push $FULL_IMAGE_NAME

    - name: Final Output
      run: |
        echo "=== SUCCESS ==="
        echo "Image pushed to:"
        echo "$FULL_IMAGE_NAME"
